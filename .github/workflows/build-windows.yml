name: Build Windows Standalone Executable

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install playwright==1.40.0
        pip install pyinstaller

    - name: Install Playwright browsers (bundled mode)
      env:
        PLAYWRIGHT_BROWSERS_PATH: 0
      run: |
        playwright install chromium

    - name: Build standalone executable
      run: |
        pyinstaller ^
          --clean ^
          --name=CampusPortalAutologin ^
          --onedir ^
          --console ^
          --add-data="config.json.template:." ^
          --add-data="install_task.py:." ^
          --add-data="remove_task_scheduler.bat:." ^
          --add-data="run_hidden.vbs:." ^
          --add-data="README_STANDALONE.md:." ^
          --hidden-import=playwright ^
          --hidden-import=playwright.sync_api ^
          --hidden-import=playwright._impl._api_types ^
          --hidden-import=playwright._impl._driver ^
          --hidden-import=playwright.driver ^
          --exclude=tkinter ^
          --exclude=matplotlib ^
          --exclude=numpy ^
          --exclude=pandas ^
          src/campus_auto_connect_browser.py

    - name: Display build output
      run: |
        echo "Build completed!"
        echo "Output directory: dist/CampusPortalAutologin/"
        echo ""
        echo "Files:"
        dir dist /s /b

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: CampusPortalAutologin-Windows-Standalone
        path: dist/CampusPortalAutologin/
        retention-days: 30

    - name: Create ZIP package
      if: startsWith(github.ref, 'refs/tags/')
      run: |
        cd dist
        powershell Compress-Archive -Path CampusPortalAutologin -DestinationPath CampusPortalAutologin.zip -Force

    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-create-release@v1
      with:
        draft: false
        files: dist/CampusPortalAutologin.zip
        tag: ${{ github.ref_name }}
        name: Campus Portal Autologin ${{ github.ref_name }}
        body: |
          ## Campus Portal Autologin - Standalone Windows Executable
          
          ### Quick Start
          1. Download `CampusPortalAutologin.zip`
          2. Extract to any directory
          3. Copy `config.json.template` to `config.json`
          4. Edit `config.json` with your credentials
          5. Run `CampusPortalAutologin.exe`
          
          ### System Requirements
          - Windows 10 or higher
          - 2GB+ RAM recommended
          - Network connection to campus gateway
          
          ### Features
          - Automatic login with browser automation
          - Intelligent status detection
          - Multi-ISP support
          - Silent background operation
          - Detailed logging
          
          Full documentation in the included README_STANDALONE.md
